<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Adventures of Ted &amp; Rose</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  #gameCanvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    touch-action: none;
  }
</style>
</head>
<body>
<canvas id="gameCanvas" width="960" height="540"></canvas>
<script>
// ============================================================
//  THE ADVENTURES OF TED & ROSE  –  A Mario-style platformer
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

const W = canvas.width;
const H = canvas.height;

// Scale canvas to fit screen while preserving 16:9 internal resolution
function fitCanvas() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width  = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
window.addEventListener('resize', fitCanvas);
fitCanvas();

// ── Game states ──────────────────────────────────────────────
const STATE = { START: 'start', SELECT: 'select', PLAYING: 'playing', WIN: 'win', DEAD: 'dead' };
let gameState = STATE.START;

// ── Input ────────────────────────────────────────────────────
const keys = {};
let gamepad = null;
let prevGP  = {};   // previous gamepad button states (for edge detection)

window.addEventListener('keydown', e => { keys[e.code] = true;  e.preventDefault(); });
window.addEventListener('keyup',   e => { keys[e.code] = false; });

// Resume AudioContext and start music on first user interaction
function onFirstInteraction() {
  musicTrack = null;
  const ac = getAudioCtx(); // created during user gesture → starts as 'running'
  if (ac.state === 'suspended') ac.resume();
  playMusic('start');
  // Consume this keypress so it doesn't simultaneously advance the game state.
  // The user must press Enter/Space a second time to leave the title screen.
  enterWasDown = true;
  window.removeEventListener('keydown', onFirstInteraction);
  window.removeEventListener('pointerdown', onFirstInteraction);
  window.removeEventListener('touchstart', onFirstInteraction);
}
window.addEventListener('keydown', onFirstInteraction);
window.addEventListener('pointerdown', onFirstInteraction);
window.addEventListener('touchstart', onFirstInteraction, { passive: true });

window.addEventListener('gamepadconnected',    e => { gamepad = e.gamepad; console.log('Gamepad connected:', e.gamepad.id); });
window.addEventListener('gamepaddisconnected', e => { gamepad = null; });

// ── Touch controls ────────────────────────────────────────────
let hasTouchScreen = false; // set true only after a real touch event fires
const touch = { left: false, right: false, jump: false, anyTap: false };

// Button centers and hit radius in canvas pixels
const TC = {
  left:  { cx: 75,  cy: 468, r: 44 },
  right: { cx: 185, cy: 468, r: 44 },
  jump:  { cx: 885, cy: 468, r: 44 },
};

function getTouchCanvasPos(t) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (t.clientX - rect.left) * (W / rect.width),
    y: (t.clientY - rect.top)  * (H / rect.height),
  };
}

function refreshTouchStates(e) {
  touch.left = false; touch.right = false; touch.jump = false;
  for (const t of e.touches) {
    const p = getTouchCanvasPos(t);
    if (p.x < W * 0.15)                        touch.left  = true;
    if (p.x >= W * 0.15 && p.x < W * 0.30)    touch.right = true;
    if (p.x >= W * 0.30)                       touch.jump  = true;
  }
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  hasTouchScreen = true;
  touch.anyTap = true;
  refreshTouchStates(e);
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  refreshTouchStates(e);
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  refreshTouchStates(e);
  if (e.touches.length === 0) { touch.anyTap = false; }
}, { passive: false });
canvas.addEventListener('touchcancel', e => {
  touch.left = false; touch.right = false; touch.jump = false; touch.anyTap = false;
}, { passive: false });

// ── Audio ─────────────────────────────────────────────────────
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function sfxJump() {
  const ac = getAudioCtx();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain); gain.connect(ac.destination);
  osc.type = 'square';
  osc.frequency.setValueAtTime(300, ac.currentTime);
  osc.frequency.exponentialRampToValueAtTime(600, ac.currentTime + 0.12);
  gain.gain.setValueAtTime(0.18, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.18);
  osc.start(ac.currentTime);
  osc.stop(ac.currentTime + 0.18);
}

function sfxCoin() {
  const ac = getAudioCtx();
  [880, 1320].forEach((freq, i) => {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sine';
    const t = ac.currentTime + i * 0.07;
    osc.frequency.setValueAtTime(freq, t);
    osc.frequency.exponentialRampToValueAtTime(freq * 1.5, t + 0.08);
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    osc.start(t);
    osc.stop(t + 0.18);
  });
}

function sfxSquash() {
  const ac = getAudioCtx();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain); gain.connect(ac.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(220, ac.currentTime);
  osc.frequency.exponentialRampToValueAtTime(40, ac.currentTime + 0.15);
  gain.gain.setValueAtTime(0.25, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
  osc.start(ac.currentTime);
  osc.stop(ac.currentTime + 0.2);
}

function sfxWin() {
  const ac = getAudioCtx();
  const notes = [523, 659, 784, 1047]; // C5 E5 G5 C6
  notes.forEach((freq, i) => {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'square';
    const t = ac.currentTime + i * 0.14;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(0.18, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    osc.start(t);
    osc.stop(t + 0.25);
  });
}

function sfxDie() {
  const ac = getAudioCtx();
  // Descending wail
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain); gain.connect(ac.destination);
  osc.type = 'square';
  osc.frequency.setValueAtTime(440, ac.currentTime);
  osc.frequency.exponentialRampToValueAtTime(55, ac.currentTime + 0.5);
  gain.gain.setValueAtTime(0.22, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.55);
  osc.start(ac.currentTime);
  osc.stop(ac.currentTime + 0.55);
}

// ── Music engine ──────────────────────────────────────────────
let musicTrack = null; // 'start' | 'select' | 'level' | null
let musicNodes = [];   // active oscillator/gain nodes for cleanup

function stopMusic() {
  musicNodes.forEach(n => { try { n.stop(); } catch(e) {} });
  musicNodes = [];
  musicTrack = null;
}

function playMusic(track) {
  if (musicTrack === track) return;
  stopMusic();
  musicTrack = track;
  const ac = getAudioCtx();

  // Each song is defined as { bpm, melody:[[freq,beats],...], bass:[[freq,beats],...] }
  // freq=0 means rest. Loops indefinitely by rescheduling.
  const songs = {
    start: {
      bpm: 370,
      melody: [
        [659,1],[659,1],[0,1],[659,1],[0,1],[523,1],[659,1],[0,1],
        [784,2],[0,2],[392,2],[0,2],
        [523,1],[0,2],[392,1],[0,2],[330,1],[0,3],
        [440,1],[0,1],[494,1],[0,1],[466,1],[0,1],[440,1],[0,1],
        [392,1],[659,1],[784,1],[880,1],[698,1],[784,1],[0,1],[659,1],
        [523,1],[587,1],[494,1],[0,1]
      ],
      bass: [
        [131,2],[131,2],[147,2],[147,2],
        [131,2],[131,2],[98,2],[98,2],
        [131,2],[131,2],[147,2],[147,2],
        [131,2],[131,2],[98,4]
      ]
    },
    select: {
      bpm: 260,
      melody: [
        [523,1],[587,1],[659,1],[698,1],[784,1],[0,1],[784,1],[0,1],
        [880,2],[784,2],[698,1],[659,1],[587,1],[0,2],
        [523,1],[659,1],[523,1],[659,1],[784,2],[0,2],
        [698,1],[784,1],[698,1],[659,1],[523,2],[0,2]
      ],
      bass: [
        [131,2],[165,2],[175,2],[196,2],
        [220,2],[196,2],[175,2],[165,2],
        [131,2],[165,2],[196,2],[175,2],
        [131,4],[131,4]
      ]
    },
    level: {
      bpm: 320,
      melody: [
        [659,1],[659,1],[0,1],[659,1],[0,1],[523,1],[659,1],[0,1],[784,2],[0,2],
        [784,1],[698,1],[659,1],[0,1],[523,1],[0,1],[392,1],[0,1],
        [659,1],[523,1],[392,1],[0,1],[440,1],[494,1],[0,1],[494,1],[440,1],[0,1],
        [523,1],[0,1],[392,1],[330,2],[0,2]
      ],
      bass: [
        [131,2],[131,1],[131,1],[131,2],[131,2],
        [131,2],[131,1],[131,1],[98,2],[98,2],
        [131,2],[131,1],[131,1],[131,2],[131,2],
        [165,2],[131,2],[98,4]
      ]
    }
  };

  const song = songs[track];
  if (!song) return;
  const beat = 60 / song.bpm;

  function schedulePart(notes, gainVal, type, startTime) {
    let t = startTime;
    let totalBeats = 0;
    for (const [freq, beats] of notes) {
      if (freq > 0) {
        const osc = ac.createOscillator();
        const g = ac.createGain();
        osc.connect(g); g.connect(ac.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, t);
        g.gain.setValueAtTime(gainVal, t);
        g.gain.setValueAtTime(gainVal, t + beat * beats - 0.04);
        g.gain.linearRampToValueAtTime(0, t + beat * beats);
        osc.start(t);
        osc.stop(t + beat * beats);
        musicNodes.push(osc);
      }
      t += beat * beats;
      totalBeats += beats;
    }
    return totalBeats * beat; // total duration of one loop
  }

  function loopPart(notes, gainVal, type) {
    const loopDuration = notes.reduce((s, [,b]) => s + b, 0) * beat;
    function schedule(startTime) {
      if (musicTrack !== track) return;
      schedulePart(notes, gainVal, type, startTime);
      setTimeout(() => schedule(startTime + loopDuration), (loopDuration - 0.5) * 1000);
    }
    schedule(ac.currentTime + 0.05);
  }

  loopPart(song.melody, 0.05, 'square');
  loopPart(song.bass,   0.04, 'triangle');
}

function getGamepad() {
  const gps = navigator.getGamepads ? navigator.getGamepads() : [];
  for (let g of gps) { if (g) return g; }
  return null;
}

function gpButton(idx) {
  const g = getGamepad();
  return g && g.buttons[idx] && g.buttons[idx].pressed;
}
function gpAxis(idx) {
  const g = getGamepad();
  return g ? g.axes[idx] : 0;
}
// Edge detect: true only on the frame the button is first pressed
function gpJustPressed(idx) {
  const now  = gpButton(idx);
  const prev = prevGP[idx] || false;
  return now && !prev;
}

function isLeft()   { return keys['ArrowLeft']  || keys['KeyA'] || gpAxis(0) < -0.4 || gpButton(14) || touch.left; }
function isRight()  { return keys['ArrowRight'] || keys['KeyD'] || gpAxis(0) >  0.4 || gpButton(15) || touch.right; }
function isJump()   { return keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || gpButton(0) || gpButton(1) || touch.jump; }
function isSelect() { return keys['Enter'] || keys['Space'] || gpJustPressed(0) || gpJustPressed(9); }
function isLeft1()  { return keys['ArrowLeft'] || keys['KeyA'] || gpAxis(0) < -0.4 || gpButton(14) || touch.left; }
function isRight1() { return keys['ArrowRight']|| keys['KeyD']|| gpAxis(0) >  0.4 || gpButton(15) || touch.right; }

// ── Palette ──────────────────────────────────────────────────
const C = {
  sky1: '#87CEEB', sky2: '#d4f0ff',
  ground: '#5c3d11', grass: '#4caf50', grassLight: '#66bb6a',
  brick: '#c0622b', brickShadow: '#8b3a15',
  coin: '#FFD700',
  ted: { body:'#e8c090', shirt:'#ff6699', pants:'#1a3a80', shoes:'#2a1a0a', hair:'#8B4513', eyes:'#1a1a6a' },
  rose: { body:'#f0b8a0', dress:'#8833cc', shoes:'#5511aa', hair:'#f5d020', eyes:'#6a1a4a', bow:'#ff66bb' },
  frog: { body:'#2daa44', belly:'#a0e080', eye:'#ffe000', pupil:'#1a1a1a', tongue:'#ff4466' },
  ui: { panel:'rgba(0,0,30,0.85)', border:'#00e5ff', text:'#ffffff', accent:'#FFD700', shadow:'rgba(0,0,0,0.7)' }
};

// ============================================================
//  SPRITE DRAWING HELPERS
// ============================================================

function drawRoundRect(x, y, w, h, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
  ctx.fill();
}

// ── Ted (blue shirt, brown hair, jeans) ──────────────────────
function drawTed(x, y, scale=1, flip=false, frame=0) {
  ctx.save();
  ctx.translate(x, y);
  if (flip) { ctx.scale(-1, 1); }
  ctx.translate(0, -32 * scale); // shift so feet (y=+32) align with anchor
  const s = scale;
  const t = C.ted;

  // legs (animated walk)
  const legSwing = Math.sin(frame * 0.4) * 4 * s;
  ctx.fillStyle = t.pants;
  ctx.fillRect(-7*s, 18*s, 6*s, 12*s + legSwing);
  ctx.fillRect( 2*s, 18*s, 6*s, 12*s - legSwing);

  // shoes
  ctx.fillStyle = t.shoes;
  ctx.fillRect(-9*s, 28*s + legSwing, 10*s, 4*s);
  ctx.fillRect( 0*s, 28*s - legSwing, 10*s, 4*s);

  // body / shirt
  drawRoundRect(-10*s, 6*s, 20*s, 14*s, 3*s, t.shirt);

  // head
  drawRoundRect(-9*s, -14*s, 18*s, 18*s, 5*s, t.body);

  // hair
  ctx.fillStyle = t.hair;
  ctx.fillRect(-9*s, -14*s, 18*s, 8*s);
  ctx.fillRect(-9*s,  -7*s,  4*s, 14*s);
  ctx.fillRect(  6*s, -7*s,  4*s, 14*s);

  // eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(-5*s, -8*s, 5*s, 5*s);
  ctx.fillRect( 2*s, -8*s, 5*s, 5*s);
  ctx.fillStyle = t.eyes;
  ctx.fillRect(-4*s, -7*s, 3*s, 3*s);
  ctx.fillRect( 3*s, -7*s, 3*s, 3*s);

  // arms
  const armSwing = Math.sin(frame * 0.4 + Math.PI) * 5 * s;
  ctx.fillStyle = t.shirt;
  ctx.fillRect(-16*s, 8*s + armSwing, 6*s, 10*s);
  ctx.fillRect( 10*s, 8*s - armSwing, 6*s, 10*s);
  ctx.fillStyle = t.body;
  ctx.fillRect(-16*s, 16*s + armSwing, 6*s, 4*s);
  ctx.fillRect( 10*s, 16*s - armSwing, 6*s, 4*s);

  ctx.restore();
}

// ── Rose (purple dress, blonde hair) ────────────────────────
function drawRose(x, y, scale=1, flip=false, frame=0) {
  ctx.save();
  ctx.translate(x, y);
  if (flip) { ctx.scale(-1, 1); }
  const s = scale;
  ctx.translate(0, -34 * scale); // shift so feet (y=+34) align with anchor
  const r = C.rose;

  // dress / skirt
  ctx.fillStyle = r.dress;
  ctx.beginPath();
  ctx.moveTo(-12*s, 16*s);
  ctx.lineTo(-14*s, 30*s);
  ctx.lineTo( 14*s, 30*s);
  ctx.lineTo( 12*s, 16*s);
  ctx.closePath();
  ctx.fill();

  // legs
  const legSwing = Math.sin(frame * 0.4) * 3 * s;
  ctx.fillStyle = r.body;
  ctx.fillRect(-5*s, 26*s, 4*s, 6*s + legSwing);
  ctx.fillRect( 2*s, 26*s, 4*s, 6*s - legSwing);

  // shoes
  ctx.fillStyle = r.shoes;
  ctx.fillRect(-7*s, 30*s + legSwing, 8*s, 4*s);
  ctx.fillRect( 0*s, 30*s - legSwing, 8*s, 4*s);

  // body top
  drawRoundRect(-9*s, 6*s, 18*s, 12*s, 3*s, r.dress);

  // head
  drawRoundRect(-9*s, -14*s, 18*s, 18*s, 5*s, r.body);

  // hair
  ctx.fillStyle = r.hair;
  ctx.fillRect(-9*s, -14*s, 18*s, 8*s);
  ctx.fillRect(-9*s, -7*s, 4*s, 14*s);
  ctx.fillRect( 6*s, -7*s, 4*s, 14*s);

  // eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(-5*s, -8*s, 5*s, 5*s);
  ctx.fillRect( 2*s, -8*s, 5*s, 5*s);
  ctx.fillStyle = r.eyes;
  ctx.fillRect(-4*s, -7*s, 3*s, 3*s);
  ctx.fillRect( 3*s, -7*s, 3*s, 3*s);
  // lashes
  ctx.fillStyle = '#8833cc';
  ctx.fillRect(-5*s, -9*s, 2*s, 2*s);
  ctx.fillRect( 2*s, -9*s, 2*s, 2*s);

  // arms
  const armSwing = Math.sin(frame * 0.4 + Math.PI) * 5 * s;
  ctx.fillStyle = r.dress;
  ctx.fillRect(-15*s, 8*s + armSwing, 6*s, 9*s);
  ctx.fillRect( 9*s,  8*s - armSwing, 6*s, 9*s);
  ctx.fillStyle = r.body;
  ctx.fillRect(-15*s, 15*s + armSwing, 6*s, 4*s);
  ctx.fillRect( 9*s,  15*s - armSwing, 6*s, 4*s);

  ctx.restore();
}

// ── Frog ─────────────────────────────────────────────────────
function drawFrog(x, y, scale=1, flip=false, frame=0, isDead=false) {
  ctx.save();
  ctx.translate(x, y);
  if (flip) ctx.scale(-1, 1);
  const s = scale;
  const f = C.frog;

  if (isDead) {
    // flat dead frog
    ctx.fillStyle = f.body;
    drawRoundRect(-14*s, -4*s, 28*s, 10*s, 4*s, f.body);
    ctx.fillStyle = f.belly;
    ctx.fillRect(-8*s, -2*s, 16*s, 6*s);
    // X eyes
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2*s;
    ctx.beginPath(); ctx.moveTo(-6*s,-6*s); ctx.lineTo(-2*s,-2*s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-2*s,-6*s); ctx.lineTo(-6*s,-2*s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( 2*s,-6*s); ctx.lineTo( 6*s,-2*s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( 6*s,-6*s); ctx.lineTo( 2*s,-2*s); ctx.stroke();
    ctx.restore();
    return;
  }

  const hop = Math.abs(Math.sin(frame * 0.06)) * 8 * s;

  // back legs
  ctx.fillStyle = f.body;
  ctx.fillRect(-14*s, 4*s - hop*0.5, 6*s, 8*s + hop*0.5);
  ctx.fillRect(  8*s, 4*s - hop*0.5, 6*s, 8*s + hop*0.5);
  ctx.fillRect(-18*s, 10*s, 8*s, 4*s);
  ctx.fillRect( 10*s, 10*s, 8*s, 4*s);

  // body
  drawRoundRect(-12*s, -6*s - hop, 24*s, 18*s, 6*s, f.body);

  // belly
  ctx.fillStyle = f.belly;
  drawRoundRect(-7*s, -2*s - hop, 14*s, 10*s, 4*s, f.belly);

  // eyes (on top of head)
  ctx.fillStyle = f.body;
  ctx.beginPath(); ctx.arc(-7*s, -8*s - hop, 5*s, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 7*s, -8*s - hop, 5*s, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = f.eye;
  ctx.beginPath(); ctx.arc(-7*s, -8*s - hop, 3*s, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 7*s, -8*s - hop, 3*s, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = f.pupil;
  ctx.beginPath(); ctx.arc(-6*s, -8*s - hop, 1.5*s, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 6*s, -8*s - hop, 1.5*s, 0, Math.PI*2); ctx.fill();

  // mouth / tongue
  ctx.fillStyle = '#1a6a2a';
  ctx.fillRect(-5*s, 4*s - hop, 10*s, 2*s);

  ctx.restore();
}

// ── Cloud ────────────────────────────────────────────────────
function drawCloud(x, y, w) {
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.arc(x + w*0.25, y, w*0.22, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + w*0.5,  y - w*0.12, w*0.28, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + w*0.75, y, w*0.22, 0, Math.PI*2); ctx.fill();
  ctx.fillRect(x + w*0.05, y, w*0.9, w*0.18);
}

// ── Bush ─────────────────────────────────────────────────────
function drawBush(x, y, w) {
  const g = '#2e7d32';
  const gl = '#43a047';
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x + w*0.2,  y, w*0.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + w*0.5,  y - w*0.1, w*0.28, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + w*0.8,  y, w*0.2, 0, Math.PI*2); ctx.fill();
  ctx.fillRect(x, y, w, w*0.25);
  ctx.fillStyle = gl;
  ctx.beginPath(); ctx.arc(x + w*0.45, y - w*0.12, w*0.12, 0, Math.PI*2); ctx.fill();
}

// ── Star (for background) ────────────────────────────────────
function drawStar(x, y, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i=0; i<5; i++) {
    const a = (i*4*Math.PI/5) - Math.PI/2;
    const b = (i*4*Math.PI/5 + 2*Math.PI/5) - Math.PI/2;
    if (i===0) ctx.moveTo(x + Math.cos(a)*r, y + Math.sin(a)*r);
    else ctx.lineTo(x + Math.cos(a)*r, y + Math.sin(a)*r);
    ctx.lineTo(x + Math.cos(b)*(r*0.4), y + Math.sin(b)*(r*0.4));
  }
  ctx.closePath(); ctx.fill();
}

// ── Flag / Goal ──────────────────────────────────────────────
function drawFlag(x, y) {
  // pole
  ctx.fillStyle = '#aaa';
  ctx.fillRect(x - 3, y - 160, 6, 160);
  // flag
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.moveTo(x + 3, y - 160);
  ctx.lineTo(x + 50, y - 135);
  ctx.lineTo(x + 3, y - 110);
  ctx.closePath();
  ctx.fill();
  // star on flag
  drawStar(x + 20, y - 135, 10, '#fff');
  // base
  ctx.fillStyle = '#888';
  ctx.fillRect(x - 12, y - 8, 24, 8);
}

// ============================================================
//  PHYSICS & COLLISION
// ============================================================
const GRAVITY    = 0.65;
const JUMP_FORCE = -14;
const SPEED      = 4.5;
const FRICTION   = 0.82;

function rectOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function resolveCollisions(entity, w, h) {
  entity.onGround = false;
  for (const p of platforms) {
    if (!rectOverlap(entity.x, entity.y, w, h, p.x, p.y, p.w, p.h)) continue;
    // from which direction?
    const overlapLeft  = (entity.x + w) - p.x;
    const overlapRight = (p.x + p.w) - entity.x;
    const overlapTop   = (entity.y + h) - p.y;
    const overlapBot   = (p.y + p.h) - entity.y;
    const minOv = Math.min(overlapLeft, overlapRight, overlapTop, overlapBot);
    if (minOv === overlapTop && entity.vy >= 0) {
      entity.y = p.y - h;
      entity.vy = 0;
      entity.onGround = true;
    } else if (minOv === overlapBot && entity.vy <= 0) {
      entity.y = p.y + p.h;
      entity.vy = 0;
    } else if (minOv === overlapLeft) {
      entity.x = p.x - w;
      entity.vx = 0;
    } else if (minOv === overlapRight) {
      entity.x = p.x + p.w;
      entity.vx = 0;
    }
  }
}

function updatePlayer() {
  if (player.dead) {
    player.deadTimer--;
    if (player.deadTimer <= 0) {
      player.lives--;
      if (player.lives <= 0) { gameState = STATE.DEAD; stopMusic(); return; }
      resetPlayer();
      enemies = JSON.parse(JSON.stringify(enemiesInit));
      resetCoins();
      camX = 0;
    }
    return;
  }

  // Horizontal
  if (isLeft()) { player.vx -= 1.2; player.facingLeft = true; }
  if (isRight()) { player.vx += 1.2; player.facingLeft = false; }
  player.vx *= FRICTION;
  if (Math.abs(player.vx) < 0.1) player.vx = 0;
  if (player.vx >  SPEED) player.vx =  SPEED;
  if (player.vx < -SPEED) player.vx = -SPEED;

  // Jump
  const jumpNow = isJump();
  if (jumpNow && !player.jumpPressed && player.onGround) {
    player.vy = JUMP_FORCE;
    sfxJump();
  }
  player.jumpPressed = jumpNow;

  // Gravity
  player.vy += GRAVITY;
  if (player.vy > 18) player.vy = 18;

  player.x += player.vx;
  player.y += player.vy;

  // Bounds
  if (player.x < 0) { player.x = 0; player.vx = 0; }
  if (player.x + player.w > LEVEL_W) { player.x = LEVEL_W - player.w; player.vx = 0; }

  resolveCollisions(player, player.w, player.h);

  // Fell off screen
  if (player.y > H + 100) {
    player.dead = true;
    player.deadTimer = 90;
    sfxDie();
  }

  // Animation
  if (player.onGround && Math.abs(player.vx) > 0.5) {
    player.frameTimer++;
    if (player.frameTimer > 6) { player.frame++; player.frameTimer = 0; }
  } else if (!player.onGround) {
    player.frame = 2;
  } else {
    player.frame = 0;
  }

  if (player.invincible > 0) player.invincible--;

  // Coin collection
  for (const c of coins) {
    if (!c.collected && rectOverlap(player.x, player.y, player.w, player.h, c.x-10, c.y-10, 20, 20)) {
      c.collected = true;
      player.score += 100;
      c.anim = 30;
      sfxCoin();
    }
  }

  // Enemy collision
  for (const e of enemies) {
    if (e.dead) continue;
    const EW = 28, EH = 24;
    if (!rectOverlap(player.x, player.y, player.w, player.h, e.x - EW/2, e.y - EH, EW, EH)) continue;
    // stomp from above?
    const playerBottom = player.y + player.h;
    const enemyTop     = e.y - EH;
    if (player.vy > 0 && playerBottom < e.y - 2) {
      e.dead = true;
      e.deadTimer = 60;
      player.vy = -8;
      player.score += 200;
      sfxSquash();
    } else {
      // take damage
      if (player.invincible === 0) {
        player.dead = true;
        player.deadTimer = 80;
        sfxDie();
      }
    }
  }

  // Goal check
  if (player.x + player.w >= GOAL_X - 10) {
    gameState = STATE.WIN;
    sfxWin();
  }
}

function updateEnemies() {
  const EW = 28, EH = 24;
  for (const e of enemies) {
    if (e.dead) {
      e.deadTimer--;
      continue;
    }
    e.frame++;
    e.vy += GRAVITY;
    if (e.vy > 18) e.vy = 18;
    e.x += e.vx * e.dir;
    e.y += e.vy;

    // simple ground collision
    e.onGround = false;
    for (const p of platforms) {
      const ex = e.x - EW/2, ey = e.y - EH;
      if (!rectOverlap(ex, ey, EW, EH, p.x, p.y, p.w, p.h)) continue;
      const overlapTop = (ey + EH) - p.y;
      const overlapBot = (p.y + p.h) - ey;
      const overlapL   = (ex + EW) - p.x;
      const overlapR   = (p.x + p.w) - ex;
      const minOv = Math.min(overlapTop, overlapBot, overlapL, overlapR);
      if (minOv === overlapTop && e.vy >= 0) {
        e.y = p.y - 0;
        e.vy = 0;
        e.onGround = true;
      } else if (minOv === overlapL || minOv === overlapR) {
        e.dir *= -1;
      }
    }

    // Turn at level edges
    if (e.x < 20 || e.x > LEVEL_W - 20) e.dir *= -1;
  }
}

// ============================================================
let cloudParallax = 0;
let bgTime = 0;

function drawBackground() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a88cc');
  grad.addColorStop(0.6, '#87CEEB');
  grad.addColorStop(1, '#c8e6c9');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawLevel(cx) {
  // Clouds (parallax)
  for (const cl of clouds) {
    drawCloud(cl.x - cx * 0.3, cl.y, cl.w);
  }

  // Bushes (on ground surface)
  for (const b of bushes) {
    if (b.x - cx > -200 && b.x - cx < W + 200) {
      drawBush(b.x - cx, b.y - b.w*0.2, b.w);
    }
  }

  // Platforms
  for (const p of platforms) {
    if (p.x - cx > W + 100 || p.x + p.w - cx < -100) continue;
    const px = p.x - cx;
    if (p.type === 'ground') {
      // Grass top
      ctx.fillStyle = C.grass;
      ctx.fillRect(px, p.y, p.w, 12);
      ctx.fillStyle = C.grassLight;
      ctx.fillRect(px, p.y, p.w, 5);
      // Dirt
      ctx.fillStyle = C.ground;
      ctx.fillRect(px, p.y + 12, p.w, p.h - 12);
      // Dirt texture
      ctx.fillStyle = '#4a2e08';
      for (let i = 0; i < p.w; i += 40) {
        ctx.fillRect(px + i + 5, p.y + 18, 8, 4);
        ctx.fillRect(px + i + 20, p.y + 28, 6, 3);
      }
    } else if (p.type === 'brick') {
      // Brick pattern
      ctx.fillStyle = C.brick;
      ctx.fillRect(px, p.y, p.w, p.h);
      ctx.fillStyle = C.brickShadow;
      for (let i = 0; i < p.w; i += 20) {
        ctx.fillRect(px + i, p.y, 2, p.h);
      }
      ctx.fillRect(px, p.y, p.w, 2);
      ctx.fillRect(px, p.y + p.h - 2, p.w, 2);
      // highlight
      ctx.fillStyle = 'rgba(255,200,150,0.3)';
      ctx.fillRect(px, p.y, p.w, 6);
    }
  }

  // Coins
  for (const c of coins) {
    if (c.collected) continue;
    if (c.x - cx < -30 || c.x - cx > W + 30) continue;
    c.anim = (c.anim || 0) + 1;
    const bob = Math.sin(c.anim * 0.08) * 3;
    const glow = ctx.createRadialGradient(c.x-cx, c.y+bob, 2, c.x-cx, c.y+bob, 12);
    glow.addColorStop(0, '#ffffa0');
    glow.addColorStop(0.5, '#FFD700');
    glow.addColorStop(1, '#b8860b');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(c.x - cx, c.y + bob, 10, 0, Math.PI*2);
    ctx.fill();
    // shine
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath();
    ctx.arc(c.x - cx - 3, c.y + bob - 3, 3, 0, Math.PI*2);
    ctx.fill();
  }

  // Goal flag
  if (GOAL_X - cx > -100 && GOAL_X - cx < W + 100) {
    drawFlag(GOAL_X - cx, GOAL_Y);
  }
}

function drawEnemies(cx) {
  for (const e of enemies) {
    if (e.deadTimer <= 0 && e.dead) continue;
    if (e.x - cx < -60 || e.x - cx > W + 60) continue;
    drawFrog(e.x - cx, e.y, 1.2, e.dir < 0, e.frame, e.dead);
  }
}

function drawPlayerSprite(cx) {
  if (player.dead) return;
  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) return;
  const px = player.x + player.w/2 - cx;
  const py = player.y + player.h;
  if (player.character === 'ted') {
    drawTed(px, py, 1, player.facingLeft, player.frame);
  } else {
    drawRose(px, py, 1, player.facingLeft, player.frame);
  }
}

    ctx.fill();
    ctx.strokeStyle = active ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = active ? '#fff' : 'rgba(255,255,255,0.5)';
    ctx.font = 'bold 18px Arial';
    ctx.fillText(label, cx, cy);
  }

  const bh = 56, bw = 80, by = H - 80;
  drawZoneBtn('LEFT',  W * 0.075, by, bw, bh, touch.left);
  drawZoneBtn('RIGHT', W * 0.225, by, bw, bh, touch.right);
  drawZoneBtn('JUMP',  W - bw/2 - 40, by, bw, bh, touch.jump);

  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

// ============================================================
//  SCREENS
// ============================================================

// ── Animated background for menus ────────────────────────────
let menuBgTime = 0;
const menuStars = Array.from({length: 60}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  r: Math.random()*3+1, speed: Math.random()*0.5+0.1,
  brightness: Math.random()
}));

function drawMenuBackground() {
  // Deep space gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#050518');
  grad.addColorStop(0.5, '#0a1040');
  grad.addColorStop(1, '#0d2060');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  // Stars
  for (const s of menuStars) {
    const twinkle = 0.5 + 0.5*Math.sin(menuBgTime*0.05 + s.brightness*10);
    ctx.fillStyle = `rgba(255,255,255,${twinkle * 0.8 + 0.1})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r * twinkle, 0, Math.PI*2);
    ctx.fill();
  }
  // Scrolling ground preview
  const gx = (menuBgTime * 0.5) % W;
  ctx.fillStyle = '#2e7d32';
  ctx.fillRect(0, H-50, W, 50);
  ctx.fillStyle = '#1b5e20';
  ctx.fillRect(0, H-50, W, 10);
  // Moving clouds
  for (let i=0; i<4; i++) {
    const cx2 = ((menuBgTime * 0.3 + i*250) % (W+200)) - 100;
    drawCloud(cx2, 80 + i*30, 120 + i*20);
  }
}

function drawPanel(x, y, w, h, title) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(x+6, y+6, w, h);
  // Panel
  ctx.fillStyle = 'rgba(5,10,50,0.92)';
  ctx.fillRect(x, y, w, h);
  // Border glow
  ctx.strokeStyle = '#00e5ff';
  ctx.lineWidth = 3;
  ctx.strokeRect(x, y, w, h);
  ctx.strokeStyle = 'rgba(0,229,255,0.3)';
  ctx.lineWidth = 8;
  ctx.strokeRect(x-2, y-2, w+4, h+4);
  if (title) {
    ctx.textAlign = 'center';
    ctx.font = 'bold 32px Courier New';
    // Glow
    ctx.shadowColor = '#00e5ff';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#00e5ff';
    ctx.fillText(title, x + w/2, y + 44);
    ctx.shadowBlur = 0;
  }
}

// ── TITLE SCREEN ──────────────────────────────────────────────
let titleBlink = 0;
let titleCharAnim = 0;
function drawStartScreen() {
  drawMenuBackground();

  // Big title
  const tw = 640, th = 120;
  const tx = (W - tw) / 2, ty = 60;
  drawPanel(tx, ty, tw, th, null);

  ctx.textAlign = 'center';
  ctx.font = 'bold 54px Courier New';
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#FFD700';
  ctx.fillText('THE ADVENTURES OF', W/2, ty + 52);
  ctx.shadowBlur = 0;
  ctx.font = 'bold 24px Courier New';
  ctx.fillStyle = '#00e5ff';
  ctx.fillText('TED & ROSE', W/2, ty + 84);

  // Characters preview
  drawTed (W/2 - 160, H/2 + 40, 2.2, false, titleCharAnim);
  drawRose(W/2 + 160, H/2 + 40, 2.2, false, titleCharAnim + 10);

  // Name labels
  ctx.font = 'bold 18px Courier New';
  ctx.fillStyle = '#00e5ff';
  ctx.textAlign = 'center';
  ctx.fillText('TED', W/2 - 160, H/2 + 80);
  ctx.fillText('ROSE', W/2 + 160, H/2 + 80);

  // Prompt
  if (Math.floor(titleBlink / 30) % 2 === 0) {
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 22px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(hasTouchScreen ? 'TAP  ANYWHERE  TO  PLAY' : 'PRESS  START / ENTER  TO  PLAY', W/2, H - 80);
  }

  // Frog cameo bottom
  drawFrog(W/2, H - 32, 0.9, false, titleCharAnim, false);
}

// ── CHARACTER SELECT ──────────────────────────────────────────
let selectedChar = 0; // 0=ted, 1=rose
let selectBlink = 0;
let selectMoveDebounce = 0;
let charAnimFrame = 0;
function drawSelectScreen() {
  drawMenuBackground();

  drawPanel(W/2 - 340, 30, 680, 480, 'SELECT  CHARACTER');

  const charW = 220;
  const positions = [W/2 - 160, W/2 + 160];
  const names     = ['TED', 'ROSE'];

  for (let i = 0; i < 2; i++) {
    const cx2 = positions[i];
    const isSelected = selectedChar === i;

    // Card
    const cardX = cx2 - 90, cardY = 110;
    ctx.fillStyle = isSelected ? 'rgba(0,229,255,0.15)' : 'rgba(255,255,255,0.05)';
    ctx.fillRect(cardX, cardY, 180, 280);
    ctx.strokeStyle = isSelected ? '#00e5ff' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = isSelected ? 3 : 1;
    ctx.strokeRect(cardX, cardY, 180, 280);

    if (isSelected) {
      // Glow ring
      ctx.strokeStyle = 'rgba(0,229,255,0.4)';
      ctx.lineWidth = 10;
      ctx.strokeRect(cardX - 4, cardY - 4, 188, 288);
    }

    // Character sprite (big)
    if (i === 0) {
      drawTed (cx2, 255, 2.8, false, isSelected ? charAnimFrame : 0);
    } else {
      drawRose(cx2, 255, 2.8, false, isSelected ? charAnimFrame : 0);
    }

    // Name
    ctx.textAlign = 'center';
    ctx.font = 'bold 26px Courier New';
    ctx.fillStyle = isSelected ? '#FFD700' : '#aaa';
    ctx.shadowColor = isSelected ? '#FFD700' : 'transparent';
    ctx.shadowBlur = isSelected ? 15 : 0;
    ctx.fillText(names[i], cx2, 285);
    ctx.shadowBlur = 0;

    // Description
    ctx.font = '13px Courier New';
    ctx.fillStyle = isSelected ? '#cce6ff' : '#666';
    if (i === 0) {
      ctx.fillText('Brave & Bold', cx2, 313);
      ctx.fillText('Speed: ★★★★', cx2, 333);
      ctx.fillText('Jump:  ★★★', cx2, 353);
    } else {
      ctx.fillText('Agile & Clever', cx2, 313);
      ctx.fillText('Speed: ★★★', cx2, 333);
      ctx.fillText('Jump:  ★★★★★', cx2, 353);
    }

    // Selection arrow
    if (isSelected && Math.floor(selectBlink/15) % 2 === 0) {
      ctx.fillStyle = '#FFD700';
      ctx.font = '28px Courier New';
      ctx.fillText('▼', cx2, 378);
    }
  }


}

// ── WIN SCREEN ────────────────────────────────────────────────
let winAnim = 0;
function drawWinScreen() {
  drawMenuBackground();
  drawPanel(W/2 - 300, H/2 - 200, 600, 400, 'YOU  WIN!');

  ctx.textAlign = 'center';
  ctx.font = 'bold 22px Courier New';
  ctx.fillStyle = '#fff';
  ctx.fillText('Level Complete!', W/2, H/2 - 60);

  ctx.font = '20px Courier New';
  ctx.fillStyle = '#FFD700';
  ctx.fillText('Score: ' + String(player.score).padStart(6, '0'), W/2, H/2 - 20);

  const collected = coins.filter(c => c.collected).length;
  ctx.fillStyle = '#aef';
  ctx.fillText('Coins: ' + collected + ' / ' + coins.length, W/2, H/2 + 20);

  // Confetti
  for (let i = 0; i < 30; i++) {
    const cx2 = (i * 137 + winAnim * 2) % W;
    const cy2 = (i * 79  + winAnim * 3) % H;
    ctx.fillStyle = `hsl(${i*30 + winAnim*3},100%,60%)`;
    ctx.fillRect(cx2, cy2, 6, 6);
  }


}

// ── DEAD SCREEN ───────────────────────────────────────────────
let deadAnim = 0;
function drawDeadScreen() {
  drawMenuBackground();
  drawPanel(W/2 - 260, H/2 - 180, 520, 360, 'GAME  OVER');

  ctx.textAlign = 'center';
  ctx.font = '20px Courier New';
  ctx.fillStyle = '#ff8888';
  ctx.fillText('Better luck next time!', W/2, H/2 - 40);

  ctx.fillStyle = '#FFD700';
  ctx.font = '22px Courier New';
  ctx.fillText('Score: ' + String(player.score).padStart(6, '0'), W/2, H/2);

  // Dead frog (ironic)
  drawFrog(W/2, H/2 + 100, 1.5, false, 0, true);


}

// ============================================================
//  GAMEPAD BUTTON EDGE DETECTION UPDATE
// ============================================================
function updatePrevGP() {
  const g = getGamepad();
  if (g) {
    for (let i = 0; i < g.buttons.length; i++) {
      prevGP[i] = g.buttons[i].pressed;
    }
  } else {
    prevGP = {};
  }
}

// ============================================================
//  SCREEN INPUT HANDLERS
// ============================================================
function handleStartInput() {
  if (isSelect()) {
    gameState = STATE.SELECT;
    selectedChar = 0;
  }
}

let selectMoveCooldown = 0;
function handleSelectInput() {
  selectMoveCooldown = Math.max(0, selectMoveCooldown - 1);
  if (selectMoveCooldown === 0) {
    if (isLeft1() || isRight1()) {
      selectedChar = 1 - selectedChar;
      selectMoveCooldown = 18;
    }
  }
  if (isSelect()) {
    player.character = selectedChar === 0 ? 'ted' : 'rose';
    // Jump height tweak for rose
    startGame();
  }
}

// Handle keyboard enter/space for non-jump contexts
let enterWasDown = false;
function handleMenuEnter() {
  const enterNow = keys['Enter'] || keys['Space'] || gpJustPressed(0) || gpJustPressed(9) || touch.jump;
  if (enterNow && !enterWasDown) {
    enterWasDown = true;
    return true;
  }
  if (!enterNow) enterWasDown = false;
  return false;
}

function startGame() {
  enemies = JSON.parse(JSON.stringify(enemiesInit));
  resetCoins();
  resetPlayer();
  camX = 0;
  player.score = 0;
  player.lives = 3;
  gameState = STATE.PLAYING;
  winAnim = 0;
  deadAnim = 0;
  playMusic('level');
}

// ============================================================
//  MAIN LOOP
// ============================================================
const TICK_MS = 1000 / 60;  // fixed 60 Hz logic step
let lastTime = null;
let accumulator = 0;

function gameLoop(timestamp) {
  if (lastTime === null) { lastTime = timestamp; requestAnimationFrame(gameLoop); return; }
  accumulator += Math.min(timestamp - lastTime, 100);
  lastTime = timestamp;

  // Run fixed-rate logic ticks to catch up, capped at 3 to avoid spiral
  let ticks = 0;
  while (accumulator >= TICK_MS && ticks < 3) {
    accumulator -= TICK_MS;
    ticks++;

    switch (gameState) {
      case STATE.START:
        menuBgTime++; titleBlink++; titleCharAnim++;
        if (handleMenuEnter() || (touch.anyTap && !enterWasDown)) {
          enterWasDown = true;
          gameState = STATE.SELECT; selectedChar = 0; playMusic('select');
        }
        break;

      case STATE.SELECT:
        menuBgTime++; selectBlink++; charAnimFrame++;
        if (selectMoveCooldown > 0) selectMoveCooldown--;
        if (selectMoveCooldown === 0 && (isLeft1() || isRight1())) {
          selectedChar = 1 - selectedChar;
          selectMoveCooldown = 18;
        }
        if (handleMenuEnter()) {
          player.character = selectedChar === 0 ? 'ted' : 'rose';
          startGame();
        }
        break;

      case STATE.PLAYING:
        updateCamera();
        updatePlayer();
        updateEnemies();
        break;

      case STATE.WIN:
        menuBgTime++; winAnim++;
        if (handleMenuEnter()) {
          gameState = STATE.SELECT;
          selectedChar = player.character === 'ted' ? 0 : 1;
          winAnim = 0;
          playMusic('select');
        }
        break;

      case STATE.DEAD:
        menuBgTime++; deadAnim++;
        if (handleMenuEnter()) {
          gameState = STATE.SELECT;
          selectedChar = player.character === 'ted' ? 0 : 1;
          deadAnim = 0;
          playMusic('select');
        }
        break;
    }

    // Update gamepad edge detection AFTER all input reads
    updatePrevGP();
  }

  // Render once per display frame
  ctx.clearRect(0, 0, W, H);
  switch (gameState) {
    case STATE.START:    drawStartScreen(); break;
    case STATE.SELECT:   drawSelectScreen(); break;
    case STATE.PLAYING:
      drawBackground();
      drawLevel(camX);
      drawEnemies(camX);
      drawPlayerSprite(camX);
      drawHUD();
      drawProgress();
      break;
    case STATE.WIN:      drawWinScreen(); break;
    case STATE.DEAD:     drawDeadScreen(); break;
  }
  drawTouchControls();

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
